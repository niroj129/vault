<div class="game-card">
  <div class="game-thumb">
    {% if g.image %}<img loading="lazy" src="{{ url_for('static', filename=g.image) }}" alt="{{ g.name }}">
    {% else %}<div class="thumb-placeholder"><i class="fa-solid fa-dice-d20"></i></div>{% endif %}
    {% if g.featured %}<span class="ribbon">Featured</span>{% elif g.is_new %}<span class="ribbon new">New</span>{% endif %}
    <span class="live-dot {{ 'on' if g.status == 'active' else 'off' }}" title="{{ g.status }}"></span>
  </div>
  <div class="game-body">
    <h4><a href="{{ url_for('public.game_landing', slug=g.slug) }}">{{ g.name }}</a></h4>
    {% if g.category %}<span class="tag">{{ g.category }}</span>{% endif %}
    <p class="game-desc">{{ g.description[:80] }}{% if g.description|length > 80 %}…{% endif %}</p>
    <div class="game-actions">
      {% if current_user %}
        <a class="btn-gold sm" href="{{ url_for('public.play', game_id=g.id) }}" target="_blank" rel="noopener"><i class="fa-solid fa-play"></i> Play</a>
      {% else %}
        <a class="btn-gold sm" href="{{ url_for('auth.login') }}"><i class="fa-solid fa-lock"></i> Play</a>
      {% endif %}
      <a class="btn-ghost sm" href="{{ url_for('public.game_landing', slug=g.slug) }}">Details</a>
    </div>
  </div>
</div>

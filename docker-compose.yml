services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tiffany}
      POSTGRES_USER: ${POSTGRES_USER:-tiffany}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tiffany}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DATABASE_URL: postgres://${POSTGRES_USER:-tiffany}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tiffany}
      CORS_ORIGINS: ${PUBLIC_URL}
      CSRF_TRUSTED_ORIGINS: ${PUBLIC_URL}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      SEED: ${SEED:-1}
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/api/games/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s   # allow first-boot migrate + seed (image generation)

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_URL}
    restart: unless-stopped
    environment:
      # server-side rendering reaches the backend directly (media stays public)
      INTERNAL_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media:/media:ro
      - static:/static:ro

volumes:
  pgdata:
  media:
  static:
